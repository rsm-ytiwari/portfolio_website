<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Light mode background -->
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #F0EEE8; }
      .text { fill: #0D0D0C; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0D0D0C; }
      .text { fill: #F0EEE8; }
    }
  </style>

  <!-- Circular background -->
  <circle class="bg" cx="16" cy="16" r="16"/>

  <!-- YT text in Instrument Serif italic style -->
  <text class="text" x="16" y="22" font-family="'Instrument Serif', Georgia, serif" font-size="18" font-style="italic" font-weight="400" text-anchor="middle" letter-spacing="-0.5">YT</text>
</svg>