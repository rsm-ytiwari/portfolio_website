<script>
/* EDIT projects.json to add/remove projects */
(function () {
  // Detect the repo base path from window.location
  const path = window.location.pathname;
  const base = path.includes('/portfolio_website/')
    ? '/portfolio_website/'
    : './';

  function cardHTML(item) {
    const preview = item.image
      ? `<img src="${item.image}" alt="${item.title}" class="p-preview-img">`
      : `<div class="p-preview"><span>Project Preview</span></div>`;

    const tags = item.tags.slice(0, 4)
      .map(function (t) { return `<span class="p-tag">${t}</span>`; })
      .join('');

    const link = item.href || '#';

    const catAttr = Array.isArray(item.category)
      ? item.category.join(',')
      : (item.category || '');

    return `
      <div class="p-card" data-category="${catAttr}">
        ${preview}
        <div class="p-body">
          <div class="p-meta">
            <span class="p-num">${item.number}</span>
            <span class="p-year">${item.year}</span>
          </div>
          <div class="p-title">${item.title}</div>
          <div class="p-desc">${item.summary}</div>
          <div class="p-tags">${tags}</div>
          <a href="${link}" class="p-more">Read more →</a>
        </div>
      </div>`;
  }

  function updateEmptyState() {
    const visible = Array.from(
      document.querySelectorAll('#projects-grid .p-card')
    ).filter(function (c) { return c.style.display !== 'none'; });
    const emptyEl = document.getElementById('empty-state');
    if (emptyEl) emptyEl.style.display = visible.length === 0 ? 'block' : 'none';
  }

  fetch(base + 'projects.json')
    .then(function (r) { return r.json(); })
    .then(function (projects) {

      /* ── Stats bar ── */
      document.getElementById('project-count').textContent = projects.length;

      /* ── Category filter buttons ── */
      const cats = Array.from(new Set(
        projects.reduce(function (acc, p) {
          return acc.concat(
            Array.isArray(p.category) ? p.category : [p.category || 'Other']
          );
        }, [])
      )).sort();

      const bar = document.getElementById('filter-bar');
      cats.forEach(function (cat) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.filter = cat;
        btn.textContent = cat;
        bar.appendChild(btn);
      });

      /* ── Render cards ── */
      document.getElementById('projects-grid').innerHTML =
        projects.map(cardHTML).join('');

      /* ── Click-to-navigate ── */
      document.querySelectorAll('#projects-grid .p-card').forEach(function (card) {
        card.addEventListener('click', function (e) {
          if (e.target.closest('a')) return;
          var link = this.querySelector('.p-more');
          if (link && link.getAttribute('href') !== '#') {
            this.blur();
            window.location.href = link.href;
          }
        });
      });

      /* ── Filter bar click handler ── */
      bar.addEventListener('click', function (e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;

        document.querySelectorAll('.filter-btn')
          .forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        document.querySelectorAll('#projects-grid .p-card').forEach(function (card) {
          const cardCats = card.dataset.category
            ? card.dataset.category.split(',')
            : [];
          const show = filter === 'all' || cardCats.includes(filter);
          card.style.display = show ? '' : 'none';
        });

        updateEmptyState();
      });

    })
    .catch(function (err) {
      console.error('Could not load projects.json:', err);
    });
})();
</script>

(function () {

  const current = (path.split('/').filter(Boolean).pop() || 'index').replace('.html', '');
  document.querySelectorAll('.nav-link').forEach(link => {

/* ── 5. Cursor-reactive blob ──
   Blob follows cursor globally at 35% speed, capped at
   MAX_DRIFT px from origin. Returns to origin after 3 s
   of idle or on mouse leave.                                   */
(function() {
  const heroInner = document.querySelector('.hero-inner');
  if (!heroInner) return;

  let targetX = 0, targetY = 0;
  let currentX = 0, currentY = 0;
  let rafId = null;
  let idleTimer = null;
  const STRENGTH  = 0.35;
  const LERP      = 0.09;
  const MAX_DRIFT = 120;

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function lerp(a, b, t)    { return a + (b - a) * t; }

  function animate() {
    currentX = lerp(currentX, targetX, LERP);
    currentY = lerp(currentY, targetY, LERP);

    heroInner.style.setProperty('--blob-x', currentX.toFixed(2) + 'px');
    heroInner.style.setProperty('--blob-y', currentY.toFixed(2) + 'px');

    if (
      Math.abs(currentX - targetX) > 0.05 ||
      Math.abs(currentY - targetY) > 0.05
    ) {
      rafId = requestAnimationFrame(animate);
    } else {
      rafId = null;
    }
  }

  function resetTarget() {
    targetX = 0;
    targetY = 0;
    if (!rafId) rafId = requestAnimationFrame(animate);
  }

  function scheduleIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(resetTarget, 3000);
  }

  document.addEventListener('mousemove', function(e) {
    const rect = heroInner.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;

    const rawX = (e.clientX - cx) * STRENGTH;
    const rawY = (e.clientY - cy) * STRENGTH;

    targetX = clamp(rawX, -MAX_DRIFT, MAX_DRIFT);
    targetY = clamp(rawY, -MAX_DRIFT, MAX_DRIFT);

    if (!rafId) rafId = requestAnimationFrame(animate);
    scheduleIdle();
  });

  document.addEventListener('mouseleave', resetTarget);
})();

/* ── 6. Cursor spotlight + grid parallax ──
   TWO separate effects layered:
   1. Spotlight: direct cursor tracking (no lerp)
   2. Grid parallax: very slow lerp (0.035)
   Touch/stylus devices: fully excluded.
   Spotlight hides when cursor leaves viewport.         */
(function() {
  if (window.matchMedia('(hover: none)').matches) return;

  const heroWrap = document.querySelector('.hero-wrap');
  if (!heroWrap) return;

  const MAX_SHIFT  = 4;
  const LERP_GRID  = 0.035;

  let targetGX = 0, targetGY = 0;
  let currentGX = 0, currentGY = 0;
  let gridRaf = null;

  function lerpG(a, b, t) { return a + (b - a) * t; }

  function animateGrid() {
    currentGX = lerpG(currentGX, targetGX, LERP_GRID);
    currentGY = lerpG(currentGY, targetGY, LERP_GRID);
    heroWrap.style.setProperty('--grid-x', currentGX.toFixed(2) + 'px');
    heroWrap.style.setProperty('--grid-y', currentGY.toFixed(2) + 'px');
    const still =
      Math.abs(currentGX - targetGX) < 0.02 &&
      Math.abs(currentGY - targetGY) < 0.02;
    gridRaf = still ? null : requestAnimationFrame(animateGrid);
  }

  document.addEventListener('mousemove', function(e) {
    const rect = heroWrap.getBoundingClientRect();
    heroWrap.style.setProperty('--mouse-x', (e.clientX - rect.left).toFixed(0) + 'px');
    heroWrap.style.setProperty('--mouse-y', (e.clientY - rect.top).toFixed(0) + 'px');
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const rawX = ((e.clientX - cx) / rect.width)  * MAX_SHIFT * 2;
    const rawY = ((e.clientY - cy) / rect.height) * MAX_SHIFT * 2;
    targetGX = Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, rawX));
    targetGY = Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, rawY));
    if (!gridRaf) gridRaf = requestAnimationFrame(animateGrid);
  });

  document.addEventListener('mouseleave', function() {
    heroWrap.style.setProperty('--mouse-x', '-500px');
    heroWrap.style.setProperty('--mouse-y', '-500px');
    targetGX = 0; targetGY = 0;
    if (!gridRaf) gridRaf = requestAnimationFrame(animateGrid);
  });
})();

</script>
